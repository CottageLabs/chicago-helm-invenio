{{- if .Values.invenio.init }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "invenio.fullname" . }}-install-init
  labels:
    {{- include "invenio.labels" . | nindent 4 }}
    app: install-init
    module: install
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
{{/*    "helm.sh/hook-delete-policy": hook-succeeded*/}}
{{- $cmd := "invenio db init && invenio db create && invenio index init && invenio index queue init purge && invenio files location --default 'default-location'  $(invenio shell --no-term-title -c \"print(app.instance_path)\")'/data' && invenio roles create admin && invenio access allow superuser-access role admin && invenio rdm-records fixtures" -}}
{{- range $usr, $pass := .Values.invenio.default_users -}}
  {{- $cmd = printf "%s && invenio users create --active --confirm --password=%s %s" $cmd $pass $usr -}}
{{- end -}}
{{- if .Values.invenio.sysadmin.email -}}
  {{- $cmd = printf "%s && invenio users create --active --confirm --password=$INVENIO_SYSADMIN_PASSWORD %s && invenio roles add %s admin" $cmd .Values.invenio.sysadmin.email .Values.invenio.sysadmin.email -}}
{{- end -}}
{{- if and .Values.invenio.demo_data .Values.invenio.default_users -}}
  {{- $cmd = cat $cmd "&& invenio rdm-records demo" -}}
{{- end -}}

spec:
  template:
    spec:
      containers:
      - name: install-init
        image: {{ default .Values.web.image (include "invenio.image" .) }}
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        command: [
          "/bin/bash",
          "-c",
          {{ $cmd | quote }}
        ]
        envFrom:
        - configMapRef:
            name: {{ include "invenio.fullname" . }}-config
        - secretRef:
            name: {{ include "invenio.secretName" . }}
        env:
        - name: TZ
          value: {{ required "Missing .Values.global.timezone" .Values.global.timezone }}
        {{- include "invenio.config.queue" . | nindent 8 }}
        {{- include "invenio.config.database" . | nindent 8 }}
        {{- if .Values.invenio.sysadmin.email }}
        - name: INVENIO_SYSADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ required "Missing .Values.invenio.sysadmin.passwordSecret" .Values.invenio.sysadmin.passwordSecret }}
              key: {{ .Values.invenio.sysadmin.passwordSecretKey | default "password" }}
        {{- end }}
        {{- with .Values.invenio.extraEnvVars }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        volumeMounts:
          {{- range $key, $value := .Values.invenio.vocabularies }}
          - name: vocabularies
            mountPath: "/opt/invenio/var/instance/app_data/vocabularies/{{ $key }}"
            subPath: "{{ $key }}"
          {{- end }}
        {{- include "invenio.config.sentry" . | nindent 8 }}
        {{- if .Values.web.resources }}
        resources: {{- toYaml .Values.web.resources | nindent 10 }}
        {{- end }}
      restartPolicy: OnFailure
      {{- if .Values.invenio.vocabularies }}
      volumes:
        - name: vocabularies
          configMap:
            name: "{{ include "invenio.fullname" . }}-vocabularies"
      {{- end }}
      {{- if .Values.web.imagePullSecret }}
      imagePullSecrets:
      - name: {{ .Values.web.imagePullSecret }}
      {{- end }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
